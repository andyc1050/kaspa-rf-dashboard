name: Build and publish KASPA dashboard

on:
  workflow_dispatch:
  schedule:
    # CoinGecko daily data normally settles shortly after 00:35 UTC.
    - cron: "15 1 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "data/kaspa_daily_ohlcv.csv"
      - "outputs/**"
      - "site/**"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Update KASPA data
        run: python update_kaspa_data.py

      - name: Train Random Forest and rebuild outputs
        run: python random_forest_kaspa.py --input data/kaspa_daily_ohlcv.csv

      - name: Build static dashboard for GitHub Pages
        env:
          KASPA_DASHBOARD_HOSTING_MODE: pages
        run: python build_dashboard.py

      - name: Prepare Pages artifact
        run: python prepare_pages.py

      - name: Commit updated data seed
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/kaspa_daily_ohlcv.csv
          git diff --cached --quiet || git commit -m "Update KASPA data [skip ci]"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
